version: "2"

linters:
  default: none
  enable:
    - errcheck       # Unchecked errors
    - gosimple       # Simplification suggestions
    - govet          # go vet checks
    - ineffassign    # Ineffectual assignments
    - staticcheck    # Static analysis
    - unused         # Unused code
    - gofmt          # Formatting
    - goimports      # Import ordering
    - misspell       # Common spelling mistakes
    - gocritic       # Opinionated checks
    - godot          # Comment punctuation
    - noctx          # http.NewRequest without context
    - bodyclose      # HTTP response body not closed
    - nilerr         # Return nil after nil error check

linters-settings:
  goimports:
    local-prefixes: github.com/syst3mctl/crashctl
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - ifElseChain
      - hugeParam
  godot:
    scope: declarations

issues:
  exclude-rules:
    # Test files: relax some rules
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - godot
  max-issues-per-linter: 0
  max-same-issues: 0
